<mat-toolbar color="primary">
  <a mat-button routerLink="/tenants">
    <mat-icon>arrow_back</mat-icon>
    Tenants
  </a>
  <span class="title">Namespaces</span>
  <span class="spacer"></span>
  <button mat-flat-button color="accent" (click)="openCreate()">
    <mat-icon>add</mat-icon>
    Create namespace
  </button>
</mat-toolbar>

<div class="pad">
  @if (loading) {
    <mat-spinner diameter="40" />
  } @else {
    <mat-card>
      <table mat-table [dataSource]="namespaces" class="full">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let row">{{ row.name }}</td>
        </ng-container>
        <ng-container matColumnDef="slug">
          <th mat-header-cell *matHeaderCellDef>Slug</th>
          <td mat-cell *matCellDef="let row"><code>{{ row.slug }}</code></td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let row">
            <a
              mat-button
              [routerLink]="['/tenants', tenantId, 'namespaces', row.id, 'tables']"
              >Tables</a
            >
            <button
              mat-icon-button
              (click)="confirmDelete(row)"
              color="warn"
              title="Delete namespace"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
      @if (namespaces.length === 0) {
        <p class="empty">No namespaces yet.</p>
      }
    </mat-card>
  }
</div>
