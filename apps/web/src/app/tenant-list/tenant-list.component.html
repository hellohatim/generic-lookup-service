<mat-toolbar color="primary">
  <span>Tenants</span>
  <span class="spacer"></span>
  <button mat-flat-button color="accent" (click)="openCreate()">
    <mat-icon>add</mat-icon>
    Create tenant
  </button>
</mat-toolbar>

<div class="pad">
  @if (loading) {
    <mat-spinner diameter="40" />
  } @else {
    <mat-card>
      <table mat-table [dataSource]="tenants" class="full">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let row">{{ row.name }}</td>
        </ng-container>
        <ng-container matColumnDef="slug">
          <th mat-header-cell *matHeaderCellDef>Slug</th>
          <td mat-cell *matCellDef="let row"><code>{{ row.slug }}</code></td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let row">
            <a mat-button [routerLink]="['/tenants', row.id, 'namespaces']">Namespaces</a>
            <button
              mat-icon-button
              (click)="confirmDelete(row)"
              color="warn"
              title="Delete tenant"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
      @if (tenants.length === 0) {
        <p class="empty">No tenants yet. Create one to get started.</p>
      }
    </mat-card>
  }
</div>
